<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CYNA — Mes commandes</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Charte graphique -->
    <link rel="stylesheet" href="css/style.css" />

    <style>
      .order-card { transition: box-shadow 0.2s; }
      .order-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.10) !important; }

      .badge-en_attente   { background: #ffc107; color: #000; }
      .badge-confirmee    { background: #198754; color: #fff; }
      .badge-annulee      { background: #dc3545; color: #fff; }
      .badge-remboursee   { background: #6c757d; color: #fff; }
      .badge-en_cours     { background: #0dcaf0; color: #000; }
      .badge-livree       { background: #0d6efd; color: #fff; }

      .empty-state { padding: 5rem 0; }
      .empty-state i { font-size: 4rem; opacity: .25; }

      .success-banner {
        background: linear-gradient(135deg, #d1fae5, #a7f3d0);
        border: 1px solid #6ee7b7;
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <div id="navbar-container"></div>

    <div class="container my-5">

      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/index.html">Accueil</a></li>
          <li class="breadcrumb-item active">Mes commandes</li>
        </ol>
      </nav>

      <!-- Titre + bouton retour -->
      <div class="d-flex align-items-center gap-3 mb-4">
        <button onclick="history.back()" class="btn btn-outline-secondary btn-sm px-3">
          <i class="bi bi-arrow-left me-1"></i>Retour
        </button>
        <h1 class="h3 mb-0 fw-bold">Mes commandes</h1>
      </div>

      <!-- Bannière succès (checkout Stripe) -->
      <div id="checkoutSuccessBanner" class="success-banner d-none mb-4">
        <div class="d-flex align-items-center gap-3">
          <i class="bi bi-check-circle-fill fs-3 text-success"></i>
          <div>
            <div class="fw-bold fs-5">Paiement confirmé !</div>
            <div class="text-muted small">Votre commande a bien été enregistrée et est en cours de traitement.</div>
          </div>
        </div>
      </div>

      <!-- Contenu dynamique -->
      <div id="ordersContainer">
        <!-- Skeleton loading -->
        <div id="loadingState" class="d-flex flex-column gap-3">
          <div class="card border-0 shadow-sm" style="height:72px">
            <div class="card-body d-flex align-items-center gap-3">
              <div class="placeholder-glow flex-fill">
                <span class="placeholder col-3 me-3"></span>
                <span class="placeholder col-2 me-3"></span>
                <span class="placeholder col-2 me-3"></span>
                <span class="placeholder col-1"></span>
              </div>
            </div>
          </div>
          <div class="card border-0 shadow-sm" style="height:72px">
            <div class="card-body d-flex align-items-center gap-3">
              <div class="placeholder-glow flex-fill">
                <span class="placeholder col-3 me-3"></span>
                <span class="placeholder col-2 me-3"></span>
                <span class="placeholder col-2 me-3"></span>
                <span class="placeholder col-1"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Modal détail commande -->
    <div class="modal fade" id="orderDetailModal" tabindex="-1" aria-labelledby="orderDetailModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold" id="orderDetailModalLabel">
              <i class="bi bi-receipt me-2 text-primary"></i>Détail de la commande
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
          </div>
          <div class="modal-body pt-2" id="orderDetailBody">
            <!-- Contenu injecté par commandes.js -->
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Fermer</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/commandes.js"></script>
  </body>
</html>
