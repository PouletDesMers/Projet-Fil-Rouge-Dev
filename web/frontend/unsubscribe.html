<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Désabonnement — CYNA</title>
  <link rel="icon" type="image/png" href="/img/favicon.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    html, body { height: 100%; }
    body {
      display: flex; flex-direction: column;
      background: #0d0d1a; color: #fff;
    }
    .unsub-wrapper {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem; position: relative;
    }
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(86,16,192,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(86,16,192,0.12) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none; z-index: 0;
    }
    .unsub-card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; padding: 3rem 2.5rem;
      max-width: 480px; width: 100%; text-align: center;
    }
    .unsub-card .icon {
      font-size: 4rem; color: #ff6b6b; margin-bottom: 1rem;
    }
    .btn-danger-custom {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      border: none; border-radius: 50px; padding: 0.75rem 2rem;
      font-weight: 600; color: #fff; transition: all 0.3s;
    }
    .btn-danger-custom:hover {
      transform: translateY(-2px); box-shadow: 0 8px 25px rgba(238,90,36,0.4);
      color: #fff;
    }
    .btn-outline-custom {
      border: 1px solid rgba(255,255,255,0.2); border-radius: 50px;
      padding: 0.75rem 2rem; font-weight: 500; color: #ccc;
      background: transparent; transition: all 0.3s;
    }
    .btn-outline-custom:hover {
      border-color: #fff; color: #fff; background: rgba(255,255,255,0.05);
    }
    .success-state { display: none; }
    .success-state .icon { color: #51cf66; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="unsub-wrapper">
    <div class="unsub-card" id="unsubCard">
      <div class="icon"><i class="bi bi-envelope-open"></i></div>
      <h2 class="mb-2">Newsletter CYNA</h2>
      <p class="text-muted mb-4" id="unsubText">
        Vous êtes sur le point de vous désabonner de nos communications.
      </p>
      <p class="small text-muted mb-4" id="unsubEmailDisplay"></p>

      <div id="unsubActions">
        <button class="btn btn-danger-custom w-100 mb-2" id="confirmUnsubBtn">
          <i class="bi bi-check-lg me-2"></i> Me désabonner
        </button>
        <a href="/" class="btn btn-outline-custom w-100">Annuler</a>
      </div>

      <div class="success-state" id="unsubSuccess">
        <div class="icon"><i class="bi bi-check-circle"></i></div>
        <h3>Désabonné(e) avec succès</h3>
        <p class="text-muted">Vous ne recevrez plus nos emails.<br>Vous pouvez vous réabonner à tout moment depuis votre profil.</p>
        <a href="/" class="btn btn-outline-custom mt-3">Retour à l'accueil</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const email = params.get("email");

      const display = document.getElementById("unsubEmailDisplay");
      const confirmBtn = document.getElementById("confirmUnsubBtn");
      const actions = document.getElementById("unsubActions");
      const success = document.getElementById("unsubSuccess");
      const text = document.getElementById("unsubText");

      if (!email) {
        text.textContent = "Lien invalide — aucun email fourni.";
        confirmBtn.style.display = "none";
        return;
      }

      display.textContent = `Email : ${email}`;

      confirmBtn.addEventListener("click", async () => {
        confirmBtn.disabled = true;
        confirmBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Désabonnement...';

        try {
          const resp = await fetch("/api/newsletter/unsubscribe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          if (!resp.ok) throw new Error("Erreur lors du désabonnement");

          actions.style.display = "none";
          success.style.display = "block";
        } catch (err) {
          confirmBtn.disabled = false;
          confirmBtn.innerHTML = '<i class="bi bi-check-lg me-2"></i> Me désabonner';
          text.textContent = "Une erreur est survenue. Veuillez réessayer.";
        }
      });
    })();
  </script>
</body>
</html>
