<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CYNA — Paramètres</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Charte graphique -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <div id="navbar-container"></div>

    <div class="container my-4">
      <div class="row justify-content-center g-4">
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
              <h2 class="h5 mb-0"><i class="bi bi-gear me-2"></i>Paramètres du compte</h2>
            </div>
            <div class="card-body">
              <p class="text-muted mb-4">Gérez la sécurité de votre compte.</p>

              <h3 class="h6 mb-3">Changer le mot de passe</h3>
              <form id="passwordForm" class="row g-3">
                <div class="col-12">
                  <label for="currentPassword" class="form-label">Mot de passe actuel</label>
                  <input
                    type="password"
                    class="form-control"
                    id="currentPassword"
                    minlength="8"
                    required
                  />
                </div>

                <div class="col-md-6">
                  <label for="newPassword" class="form-label">Nouveau mot de passe</label>
                  <input
                    type="password"
                    class="form-control"
                    id="newPassword"
                    minlength="8"
                    required
                  />
                </div>

                <div class="col-md-6">
                  <label for="confirmPassword" class="form-label">Confirmer le mot de passe</label>
                  <input
                    type="password"
                    class="form-control"
                    id="confirmPassword"
                    minlength="8"
                    required
                  />
                </div>

                <div class="col-12">
                  <div id="passwordMessage" class="small"></div>
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-cyna">
                    <i class="bi bi-shield-lock me-1"></i> Mettre à jour le mot de passe
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
              <h2 class="h6 mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Zone sensible</h2>
            </div>
            <div class="card-body">
              <p class="text-muted mb-3">
                La suppression de compte n'est pas encore disponible en libre-service.
                Contactez le support pour finaliser cette action.
              </p>
              <a href="mailto:support@cyna.fr?subject=Suppression%20de%20compte" class="btn btn-outline-danger">
                <i class="bi bi-envelope me-1"></i> Contacter le support
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/parametres.js"></script>
  </body>
</html>
