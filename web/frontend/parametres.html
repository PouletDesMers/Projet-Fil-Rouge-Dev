<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CYNA — Paramètres</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Charte graphique -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <div id="navbar-container"></div>

    <div class="container my-4">
      <div class="row justify-content-center g-4">
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-cyna text-white">
              <h2 class="h5 mb-0"><i class="bi bi-translate me-2"></i><span data-i18n="settings.language_title">Langue de l’interface</span></h2>
            </div>
            <div class="card-body">
              <p class="text-muted mb-3" data-i18n="settings.language_desc">Choisissez la langue d’affichage.</p>
              <label for="languageSwitcher" class="form-label" data-i18n="settings.language_label">Langue</label>
              <select id="languageSwitcher" class="form-select lang-switcher">
                <option value="fr">Français</option>
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="ar">العربية</option>
                <option value="zh">中文</option>
              </select>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-cyna text-white">
              <h2 class="h5 mb-0"><i class="bi bi-gear me-2"></i><span data-i18n="settings.account_title">Paramètres du compte</span></h2>
            </div>
            <div class="card-body">
              <p class="text-muted mb-4" data-i18n="settings.security_desc">Gérez la sécurité de votre compte.</p>

              <h3 class="h6 mb-3" data-i18n="settings.change_password">Changer le mot de passe</h3>
              <form id="passwordForm" class="row g-3">
                <div class="col-12">
                  <label for="currentPassword" class="form-label" data-i18n="settings.current_password">Mot de passe actuel</label>
                  <input
                    type="password"
                    class="form-control"
                    id="currentPassword"
                    minlength="8"
                    required
                  />
                </div>

                <div class="col-md-6">
                  <label for="newPassword" class="form-label" data-i18n="settings.new_password">Nouveau mot de passe</label>
                  <input
                    type="password"
                    class="form-control"
                    id="newPassword"
                    minlength="8"
                    required
                  />
                </div>

                <div class="col-md-6">
                  <label for="confirmPassword" class="form-label" data-i18n="settings.confirm_password">Confirmer le mot de passe</label>
                  <input
                    type="password"
                    class="form-control"
                    id="confirmPassword"
                    minlength="8"
                    required
                  />
                </div>

                <div class="col-12">
                  <div id="passwordMessage" class="small"></div>
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-cyna">
                    <i class="bi bi-shield-lock me-1"></i> <span data-i18n="settings.update_password">Mettre à jour le mot de passe</span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
              <h2 class="h6 mb-0"><i class="bi bi-exclamation-triangle me-2"></i><span data-i18n="settings.danger_zone">Zone sensible</span></h2>
            </div>
            <div class="card-body">
              <p class="text-muted mb-3" data-i18n="settings.delete_info">La suppression de compte n'est pas encore disponible en libre-service. Contactez le support pour finaliser cette action.</p>
              <a href="mailto:support@cyna.fr?subject=Suppression%20de%20compte" class="btn btn-outline-danger">
                <i class="bi bi-envelope me-1"></i> <span data-i18n="settings.contact_support">Contacter le support</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/parametres.js"></script>
  </body>
</html>
