<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catégories | CYNA</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- Charte graphique -->
    <link rel="stylesheet" href="css/style.css" />

    <style>
      :root {
        --p-900: #351e90;
        --p-700: #5610c0;
        --a-500: #7602f9;
        --bg: #eeeeee;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --ring: rgba(118, 2, 249, 0.22);
        --shadow: 0 10px 30px rgba(17, 24, 39, 0.1);
        --radius: 18px;
      }
      .hero {
        padding: 18px 0 10px;
      }
      .banner {
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(53, 30, 144, 0.18);
        background: radial-gradient(
            900px 250px at 20% 40%,
            rgba(118, 2, 249, 0.42),
            transparent 55%
          ),
          radial-gradient(
            700px 220px at 80% 30%,
            rgba(86, 16, 192, 0.42),
            transparent 55%
          ),
          linear-gradient(
            135deg,
            rgba(53, 30, 144, 0.92),
            rgba(86, 16, 192, 0.8)
          );
        padding: 18px;
        color: white;
      }
      .crumbs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        opacity: 0.92;
        font-size: 12px;
        font-weight: 700;
      }
      .crumbs a {
        text-decoration: underline;
        text-underline-offset: 3px;
        color: white;
      }
      .banner h1 {
        margin: 10px 0 6px;
        font-size: 20px;
      }
      .banner p {
        margin: 0;
        opacity: 0.92;
        max-width: 80ch;
        line-height: 1.45;
        font-size: 14px;
      }
      .content {
        padding: 10px 0 36px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }
      .cat-card {
        background: var(--card);
        border: 1px solid rgba(17, 24, 39, 0.1);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        transition: transform 0.12s ease, border-color 0.12s ease,
          box-shadow 0.12s ease;
        text-decoration: none;
        color: inherit;
      }
      .cat-card:hover {
        transform: translateY(-2px);
        border-color: rgba(118, 2, 249, 0.35);
        box-shadow: 0 18px 40px rgba(17, 24, 39, 0.14);
        text-decoration: none;
        color: inherit;
      }
      .cat-cover {
        height: 120px;
        position: relative;
      }
      .badge {
        position: absolute;
        left: 14px;
        bottom: 14px;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.25);
        padding: 8px 10px;
        border-radius: 999px;
        color: white;
        font-weight: 800;
        font-size: 12px;
        letter-spacing: 0.2px;
        backdrop-filter: blur(8px);
      }
      .cat-body {
        padding: 14px;
      }
      .cat-title {
        margin: 0 0 6px;
        font-size: 16px;
        font-weight: 900;
        color: var(--p-900);
      }
      .cat-desc {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        min-height: 40px;
      }
      .cat-icon {
        font-size: 2rem;
        margin-bottom: 10px;
        color: white;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <div id="navbar-container"></div>

    <section class="hero">
      <div class="container">
        <div class="banner">
          <div class="crumbs">
            <a href="/index.html">Accueil</a><span>›</span><span>Catégories</span>
          </div>
          <h1>Catégories de services</h1>
          <p>
            Choisissez une catégorie pour accéder au catalogue correspondant.
          </p>
        </div>
      </div>
    </section>

    <main class="content">
      <div class="container">
        <div class="row">
          <div class="col">
            <h2>Nos services</h2>
            <p class="text-muted">Sélectionnez une catégorie de services</p>
          </div>
        </div>

        <section class="grid" id="categoriesGrid">
          <!-- Categories will be loaded dynamically -->
          <div class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Chargement...</span>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/categories.js"></script>
  </body>
</html>
