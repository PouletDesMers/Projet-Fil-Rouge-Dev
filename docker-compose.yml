services:
  db:
    build: ./db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: mydb
      API_SECRET: ${API_SECRET}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-/backups/restic-repo}
      LOG_FILE_PATH: /var/log/api/api.log
    volumes:
      - backups_data:/backups
      - api_logs:/var/log/api

  web:
    build: ./web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      API_SECRET: ${API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      UPLOADS_DIR: /app/uploads
      FRONTEND_URL: http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    # No bind mounts for production: use the files baked into the image (includes node_modules).
    # For local development, mount the source and run `npm install` on the host.

volumes:
  postgres_data:
  uploads_data:
  backups_data:
  api_logs:
