services:
  db:
    build: ./db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: mydb
      API_SECRET: f51c47d6625d43163d103a0524141171ca526cce5f30d575dcf1e32dfca43e88

  web:
    build: ./web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      API_SECRET: f51c47d6625d43163d103a0524141171ca526cce5f30d575dcf1e32dfca43e88
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    # No bind mounts for production: use the files baked into the image (includes node_modules).
    # For local development, mount the source and run `npm install` on the host.

volumes:
  postgres_data: