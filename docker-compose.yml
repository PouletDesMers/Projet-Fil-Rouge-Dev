services:
  db:
    build: ./db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: mydb
      API_SECRET: 0253fe33955b37ccdeae6e70f230d74a0161b0860f9a1bb17dadd733eea42066
      RESTIC_PASSWORD: cyna-restic-AES256-secret
      RESTIC_REPOSITORY: /backups/restic-repo
    volumes:
      - backups_data:/backups

  web:
    build: ./web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      API_SECRET: 0253fe33955b37ccdeae6e70f230d74a0161b0860f9a1bb17dadd733eea42066
      RESEND_API_KEY: ${RESEND_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      UPLOADS_DIR: /app/uploads
      FRONTEND_URL: http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    # No bind mounts for production: use the files baked into the image (includes node_modules).
    # For local development, mount the source and run `npm install` on the host.

volumes:
  postgres_data:
  uploads_data:
  backups_data: